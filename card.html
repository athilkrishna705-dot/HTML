<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SBI Elite Card - Preview</title>
<style>
    body {
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
        width: 440px;
        height: 280px;
        background: linear-gradient(135deg, #1a0f1a 0%, #0f050f 100%);
        border-radius: 18px;
        box-shadow: 
            0 25px 50px -12px rgba(0,0,0,0.9),
            inset 0 0 80px rgba(80,20,80,0.15);
        position: relative;
        overflow: hidden;
        color: #e0d0e0;
    }

    /* Mandala background pattern */
    .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: 
            radial-gradient(circle at 30% 70%, rgba(180,120,200,0.08) 0%, transparent 40%),
            radial-gradient(circle at 70% 30%, rgba(200,140,220,0.07) 0%, transparent 45%);
        opacity: 0.7;
        pointer-events: none;
    }

    .mandala {
        position: absolute;
        width: 380px;
        height: 380px;
        top: -50px;
        right: -50px;
        background: url('https://images.unsplash.com/photo-1608501947452-7e12a1b784fb?w=800&q=70') center/cover;
        opacity: 0.18;
        filter: brightness(0.7) sepia(0.3);
        border-radius: 50%;
        pointer-events: none;
    }

    .content {
        position: relative;
        z-index: 2;
        padding: 28px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .bank-name {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: #d4b8e8;
        text-shadow: 0 0 8px rgba(180,120,220,0.4);
    }

    .chip {
        width: 52px;
        height: 40px;
        background: linear-gradient(135deg, #ffd700, #e0c200);
        border-radius: 6px;
        box-shadow: 
            inset 0 0 10px rgba(255,255,255,0.5),
            0 0 15px rgba(255,215,0,0.4);
        position: relative;
    }

    .chip::after {
        content: "";
        position: absolute;
        inset: 6px;
        background: #c4a000;
        border-radius: 4px;
    }

    .card-number {
        font-family: 'Courier New', Courier, monospace;
        font-size: 28px;
        letter-spacing: 4px;
        margin: 40px 0 25px 0;
        font-weight: bold;
        color: #f0e8ff;
        text-shadow: 0 0 10px rgba(240,230,255,0.3);
    }

    .bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }

    .name {
        font-size: 20px;
        letter-spacing: 1.5px;
        font-weight: 500;
        color: #e8d8ff;
    }

    .valid {
        text-align: right;
    }

    .valid-label {
        font-size: 11px;
        color: #b090c0;
        margin-bottom: 4px;
    }

    .valid-date {
        font-size: 18px;
        font-weight: bold;
    }

    .visa {
        font-family: 'Times New Roman', serif;
        font-size: 38px;
        font-weight: bold;
        color: #e0c0ff;
        text-shadow: 0 0 12px rgba(220,180,255,0.5);
        letter-spacing: -1px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="mandala"></div>
    
    <div class="content">
        <div class="header">
            <div class="bank-name">SBI Card</div>
            <div class="chip"></div>
        </div>

        <div class="card-number">
            3211 0123 4567 8901
        </div>

        <div class="bottom-row">
            <div>
                <div class="name">VIJAY KUMAR</div>
            </div>

            <div class="valid">
                <div class="valid-label">MONTH/YEAR</div>
                <div class="valid-date">12/25</div>
            </div>

            <div class="visa">VISA</div>
        </div>
    </div>
</div>

</body>
</html>
