<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h2>2. Write a function to print numbers from 1 to 10.</h2>
    <script>
        function print()
        {
            for(let i=1;i<=10;i++){
            document.write(i +"<br>");
        
        }
    }
    print();

        
    </script>
</body>
