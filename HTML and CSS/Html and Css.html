<!DOCTYPE html>
<html>
    <head>
    <style>
        .container{
            width: 250px;
            margin: auto;
            background-color: orange;
            border-radius: 140px 140px 20px 20px;
            padding: 40px;
            border: solid red;
        }
        .box{
            width: 80px;
            margin: 100px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
            border: dotted white;
        }
        .css1{background: red;color: white;}
        .css2{background: yellow;color: black;}
        .css3{background: green;color: yellow;}
    </style>
    </head>
    <body>
        <h1 class="container">
            <div class="box css1">MCA</div>
            <div class="box css2">BCA</div>
            <div class="box css3">BBA</div>
        </h1>
    </body>
</html>
