<!DOCTYPE html>
<html>
<head>
    <title>Margin Vs Padding</title>
    <style>
        .box4 {
            border: 3px solid black;
            margin: 30px;
            padding: 20px;
        }

        .box {
            border: 2px solid black;
            padding: 100px;
            background:  #f7a5a5;
            margin-bottom: 50px;
        }

        .row {
            display: flex;
            margin-top: 40px;
        }

        .box2 {
            flex: 1;
            border: 2px solid black;
            padding: 30px;
            background:  #f7a5a5;
        }

        .box3 {
            flex: 1;
            border: 2px solid black;
            padding: 30px;
            background: #c5f5a4;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center; text-decoration:underline;">Margin Vs Padding</h1>

    
    <div class="box4">
        <div class="box">
            <p>This is paragraph<br>
            This is paragraph<br>
            This is paragraph<br>
            This is paragraph<br>
            This is paragraph</p>
        </div>
    </div>

    
    <div class="box4">
        <div class="row">
            <div class="box2">
                <p>This is paragraph<br>
                This is paragraph<br>
                This is paragraph<br>
                This is paragraph<br>
                This is paragraph</p>
            </div>

            <div class="box3">
                <p>This is paragraph<br>
                This is paragraph<br>
                This is paragraph<br>
                This is paragraph<br>
                This is paragraph</p>
            </div>
        </div>
    </div>

</body>
</html>
