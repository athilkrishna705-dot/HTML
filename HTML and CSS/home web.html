<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    background: rgb(227, 216, 216);
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: white;
    box-shadow: 0 2px 5px black;
}

.navbar ul {
    display: flex;
}

.navbar ul li {
    margin: 0 20px;
    font-size: 16px;
}

.btn-nav {
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 5px;
}
.logo{
    color: orange;
}

.hero {
    display: flex;
    align-items: center;
    padding: 80px 50px;
}

.text {
    flex: 1;
}

.text h4 {
    color:red;
    font-size: 14px;
}

.text h1 {
    font-size: 48px;
    color: black;
}

.text p {
    width: 80%;
    color: #555;
    margin-bottom: 30px;
}

.buttons {
    display: flex;
    gap: 15px;
}

.btn-learn {
    padding: 12px 24px;
    background: red;
    border: none;
    color: white;
    border-radius: 5px;
}

.btn-hire {
    padding: 12px 24px;
    background: white;
    border: 1px solid #aca4a4;
    color:black;
    border-radius: 5px;
}

.hero-img {
    width: 400px;
}

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">PORTFOLIO</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
            <li>Portfolio</li>
            <li>Contact</li>
        </ul>
        <button class="btn-nav">Get Free Consultant</button>
    </nav>

    <section class="hero">
        <div class="text">
            <h4>GET EVERY SINGLE SOLUTION.</h4>
            <h1>Im Designer<br>
                Athil krishna.p</h1>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
                Aliquid tempore incidunt ullam earum vitae dolore magni.
            </p>

            <div class="buttons">
                <button class="btn-learn">Learn More</button>
                <button class="btn-hire">Hire Me</button>
            </div>
        </div>

        <div class="hero-img">
            <img src="Premium_Photo___A_student_pensive_young_man_with-removebg-preview.png">
        </div>
    </section>

</body>
</html>
