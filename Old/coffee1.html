<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #3b0d18;
            color: white;
            margin: 0%;
            padding: 0;
            background-image: url(Coffee\ mug\ Photos\ -\ Download\ Free\ High-Quality\ Pictures\ _\ Freepik.jpeg);
            background-size: cover;
            background-repeat: no-repeat;
        }

        header {
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        ul.topnav {
           list-style-type: none;
        }

        ul.topnav li a {
            color: #000000;
            padding: 14px 16px;
            text-decoration: none;
            background-color: orange;
            border-radius: 50px;
            border: 1px solid white;
            }
        ul.topnav li a:hover{
            background-color: white;
            color: black;
            border: 1px solid black;
        }    

        .hero {
            display: flex;
            align-items: center;
            padding: 60px;
        }

        .hero text {
            max-width: 500px;
        }

        .hero text h4 {
            color: #f4b23f;
            margin-bottom: 10px;
            font-style: italic;
        }

        .hero text h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .hero text p {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            border-radius: 30px;
            margin-bottom: 50px;
        }

        .order {
            background-color: orange;
            color: black;
            height: 50px;
            width: 100px;
            border-radius: 30px;
            border: 1px solid black;
        }
        .order:hover{
            background-color: white;
            color: black;
        }

        .contact {
            background-color: rgb(0, 0, 0);
            border: 1px solid rgb(255, 255, 255);
            color: rgb(255, 255, 255);
            height: 50px;
            width: 100px;
            border-radius: 30px;
        }
        .contact:hover{
            background-color: white;
            color: black;
            border: 1px solid black;
        }
    </style>
</head>
<body>

<header>
    <h1>☕ Coffee</h1>
    <ul class="topnav">
       <li><a href="#">Home</a>
       <a href="#">About</a>
       <a href="#">Menu</a>
       <a href="#">Testimonials</a>
       <a href="#">Gallery</a>
       <a href="#">Contact</a></li>
    </ul>
</header>

<section class="hero">
    <div class="hero-text">
        <h4>Best Coffee</h4>
        <h2>Make your day great with our special coffee!</h2>
        <p>
            Welcome to our coffee paradise where every bean tells a story
            and every cup sparks joy.
        </p>
        <div class="buttons">
            <button class="order">Order Now</button>
            <button class="contact">Contact Us</button>
        </div>
    </div>
</section>

</body>
</html>
