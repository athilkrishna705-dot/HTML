<html>
<head>
<title>Test Table</title>
<style>
  table 
  {
    border-collapse: collapse;
    width: 30%;
    background-color: #dcdcdc;
  }
  th, td 
  {
    border: 1px solid black;
    padding: 3px;
  }
  </style>
</head>
<body>

<table>
  <h4><i>A test table with merged cells</i></h4>
  <tr>
    <th rowspan="2"></th>
    <th colspan="2">Average</th>
    <th rowspan="2">Red eyes</th>
  </tr>
  <tr>
    <th>height</th>
    <th>weight</th>
  </tr>
  <tr>
    <th>Males</th>
    <td>1.9</td>
    <td>0.003</td>
    <td>40%</td>
  </tr>
  <tr>
    <th>Females</th>
    <td>1.7</td>
    <td>0.002</td>
    <td>43%</td>
  </tr>
</table>

</body>
</html>
