<!DOCTYPE html>
<html lang="en">
<head>
    <title>Centered Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #24aad3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center; /* CENTER ALL TEXT */
        }

        .login-box {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left; /* keep labels/input aligned properly */
        }

        label {
            font-size: 14px;
        }

        input {
            width: 93%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password">
        </div>

        <button>Login</button>

        <p class="bottom-text">Forgot password?</p>
    </div>

</body>
</html>
