
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("Sea.jpg.jpeg");
            background-size: cover;  
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1, p {
            color: white;
        }

        button {
            margin-top: 20px;
            color: white;
            background-color: red;
            border-radius: 15px;
            border: 2px solid white;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>
</head>

<body>

    <h1>Welcome to our website</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Alias doloribus eaque, earum expedita inventore voluptates.</p>
    <button>Contact Us</button>

</html>
