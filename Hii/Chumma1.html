<!DOCTYPE html>
<html>
    <head>
<style>
    .container{
        width: 400px;
        margin: 50px;
    }
    h2{
        font-size: 35px;
        font-weight: bold;
    }
    label{
        font-size: 20px;
        display: inline-block;
        width: 150px;
        margin-bottom: 15px;
    }
    input{
        padding: 10px;
        width: 200px;
        background-color: #e31f1f;
        border: none;
        border-radius: 5px;
    }
    .btn{
        padding: 15px 40px;
        margin-right: 20px;
        background-color: #e21c1c;
        color: black;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="container">
    <h2>HTML Form</h2>

    <form>
        <label>First Name :</label>
        <input type="text"><br>

        <label>Last Name :</label>
        <input type="text"><br>

        <label>Date of Birth :</label>
        <input type="date"><br>

        <label>Email id :</label>
        <input type="email"><br>

        <label>Mobile Number :</label>
        <input type="text"><br><br>

        <button class="btn" type="submit">SUBMIT</button>
        <button class="btn" type="reset">RESET</button>
    </form>
</div>
</body>
